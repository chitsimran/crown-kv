syntax = "proto3";
package replication;

message PutRequest {
    uint64 request_id = 1;
    string key = 2;
    string value = 3;
    uint64 version = 4;   // 0 = from client; >0 = replica-to-replica
    string client_addr = 5;
    uint64 epoch = 6;
}

message PutResponse {
    bool success = 1;
    string error = 2;
    uint64 version = 3;
}

message GetRequest {
    string key = 1;
    uint64 epoch = 2;
}

message GetResponse {
    string value = 1;
    uint64 version = 2;
    string error = 3;
}

message WriteAck {
    uint64 request_id = 1;
    string key = 2;
    uint64 version = 3;
    uint64 epoch = 4;
}

message WriteAckResponse {
    bool success = 1;
}

message CommitAck {
    string key = 1;
    uint64 version = 2;
}

message CommitAckResponse {
    bool success = 1;
}

message VersionQueryRequest {
    string key = 1;
    uint64 epoch = 2;
}

message VersionQueryResponse {
    uint64 committed_version = 1;
    string error = 2;
}

message NodeInfo {
    string node_id = 1;
    string address = 2;
    int32 port = 3;
}

message FreezeRequest {
    uint64 epoch = 1;
    repeated NodeInfo v_new = 2;
}

message FreezeResponse {
    bool success = 1;
    string node_id = 2;
}

message DrainAckRequest {
    string node_id = 1;
    uint64 epoch = 2;
}

message DrainAckResponse {
    bool success = 1;
}

message ReconfigureRequest {
    uint64 epoch = 1;
    repeated NodeInfo membership = 2;
    string mode = 3;
    string removed_node_id = 4;
    string added_node_id = 5;
}

message ReconfigureResponse {
    bool success = 1;
    string node_id = 2;
}

message InflightRequest {
    string origin_node_id = 1;
    uint64 epoch = 2;
}

message InflightResponse {
    bool success = 1;
}

message StateDumpRequest {
    uint64 epoch = 1;
}

message StateDumpResponse {
    map<string, string> kv_data = 1;
    map<string, uint64> version_data = 2;
    uint64 epoch = 3;
}

message SyncCompleteRequest {
    string node_id = 1;
    uint64 epoch = 2;
}

message SyncCompleteResponse {
    bool success = 1;
}

message HeartbeatRequest {
    string node_id = 1;
    uint64 epoch = 2;
}

message HeartbeatResponse {
    bool alive = 1;
    uint64 epoch = 2;
}

message ReportFailureRequest {
    string reporter_node_id = 1;
    string failed_node_id = 2;
    uint64 epoch = 3;
}

message ReportFailureResponse {
    bool success = 1;
}

message MembershipRequest {}

message MembershipResponse {
    uint64 epoch = 1;
    repeated NodeInfo membership = 2;
    string mode = 3;
}

service ReplicationService {
    rpc Put (PutRequest) returns (PutResponse);
    rpc Get (GetRequest) returns (GetResponse);

    rpc ForwardPut (PutRequest) returns (PutResponse);
    rpc SendWriteAck (WriteAck) returns (WriteAckResponse);
    rpc VersionQuery (VersionQueryRequest) returns (VersionQueryResponse);
    rpc ForwardInflight (InflightRequest) returns (InflightResponse);
    rpc StateDump (StateDumpRequest) returns (StateDumpResponse);
}

service ClientAckService {
    rpc CommitAck (.replication.CommitAck) returns (.replication.CommitAckResponse);
}

service MetadataService {
    rpc GetMembership (MembershipRequest) returns (MembershipResponse);
    rpc Freeze (FreezeRequest) returns (FreezeResponse);
    rpc Reconfigure (ReconfigureRequest) returns (ReconfigureResponse);
    rpc ReportDrainAck (DrainAckRequest) returns (DrainAckResponse);
    rpc ReportSyncDone (SyncCompleteRequest) returns (SyncCompleteResponse);
    rpc ReportFailure (ReportFailureRequest) returns (ReportFailureResponse);
    rpc Heartbeat (HeartbeatRequest) returns (HeartbeatResponse);
}
